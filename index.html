<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voucher Scratch Card</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
body{
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f5f5f5;
    margin:0;
}

.card{
    width:90vw;
    max-width:320px;
    height:200px;
    background:#3F6285;
    color:white;
    border-radius:12px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    position:relative;
    overflow:hidden;
}

.title{ font-size:20px; }
.discount{ font-size:45px; font-weight:bold; }

canvas{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    touch-action:none;
}
</style>
</head>

<body>

<div class="card">
    <div class="title" id="title">Loading...</div>
    <div class="discount" id="discount"></div>
    <canvas id="scratch"></canvas>
</div>

<script>

// 🔥 Firebase Config
firebase.initializeApp({
   apiKey:"AIzaSyAAkMO0zICxPTPQ_fTADGhzA6DsGw1TCaU",
authDomain:"humvoucher.firebaseapp.com",
projectId:"humvoucher"
});

const auth = firebase.auth();
const db = firebase.firestore();

let uid = null;
let isAuthReady = false;
let hasClaimed = false;

// ✅ Anonymous Login
auth.signInAnonymously();

auth.onAuthStateChanged(user=>{
    if(user){
        uid = user.uid;
        isAuthReady = true;
        document.getElementById("title").innerText="Scratch to reveal voucher";
        initScratch();
    }
});

// 🎯 Scratch Logic
function initScratch(){

const canvas = document.getElementById("scratch");
const ctx = canvas.getContext("2d");

// Dynamic size
canvas.width = canvas.offsetWidth;
canvas.height = canvas.offsetHeight;

// Grey layer
ctx.fillStyle = "#C0C0C0";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.globalCompositeOperation = "destination-out";

let scratching = false;

canvas.addEventListener("mousedown",()=>scratching=true);
canvas.addEventListener("mouseup",()=>{scratching=false;check();});
canvas.addEventListener("mousemove",scratch);

canvas.addEventListener("touchstart",()=>scratching=true);
canvas.addEventListener("touchend",()=>{scratching=false;check();});

canvas.addEventListener("touchmove",(e)=>{
    e.preventDefault();
    scratch(e.touches[0]);
},{passive:false});

function scratch(e){
    if(!scratching || hasClaimed) return;

    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    ctx.beginPath();
    ctx.arc(x,y,20,0,Math.PI*2);
    ctx.fill();

    check();
}

function check(){
    if(hasClaimed) return;

    const pixels = ctx.getImageData(0,0,canvas.width,canvas.height);
    let transparent = 0;

    for(let i=3;i<pixels.data.length;i+=4){
        if(pixels.data[i] === 0) transparent++;
    }

    const percent = transparent/(pixels.data.length/4);

    if(percent > 0.30){
        hasClaimed = true;
        autoScratch(ctx, canvas);
        claimVoucher();
    }
}

function autoScratch(ctx, canvas){
    const interval = setInterval(()=>{
        for(let i=0;i<30;i++){
            const x = Math.random()*canvas.width;
            const y = Math.random()*canvas.height;
            ctx.beginPath();
            ctx.arc(x,y,12,0,Math.PI*2);
            ctx.fill();
        }

        const pixels = ctx.getImageData(0,0,canvas.width,canvas.height);
        let transparent = 0;

        for(let i=3;i<pixels.data.length;i+=4){
            if(pixels.data[i] === 0) transparent++;
        }

        if(transparent/(pixels.data.length/4) > 0.95){
            clearInterval(interval);
        }
    },30);
}

}

// 🎁 Claim Voucher
async function claimVoucher(){

if(!isAuthReady){
    alert("Please wait...");
    return;
}

try{

const snapshot = await db
.collection("hotels")
.doc("HOTEL_001")
.collection("vouchers")
.where("used","==",false)
.limit(10)
.get();

if(snapshot.empty){
    document.getElementById("title").innerText="No vouchers left";
    return;
}

const docs = snapshot.docs;
const random = docs[Math.floor(Math.random()*docs.length)];

const voucherRef = random.ref;
const data = random.data();

document.getElementById("title").innerText = data.title;
document.getElementById("discount").innerText = data.discount + "%";

await db.runTransaction(async (t)=>{

    const doc = await t.get(voucherRef);

    if(doc.data().used){
        throw "Already used";
    }

    t.update(voucherRef,{
        used:true,
        claimedBy:uid,
        claimedAt:firebase.firestore.FieldValue.serverTimestamp()
    });

});

}catch(error){
    console.error(error);
    alert("Error: " + error);
}

}

</script>

</body>
</html>
